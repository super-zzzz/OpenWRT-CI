#CI项目
name: QCA-ALL

#CI计划
on:
  #自动编译：当Auto-Clean运行完成后
  workflow_run:
    workflows: ["Auto-Clean"]
    types:
      - completed
  #手动编译
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: '手动调整插件包，多个请用\n符号隔开。'
        required: false
        type: string
      TEST:
        description: "仅输出配置文件，不编译固件。"
        default: false
        required: false
        type: boolean
      IGNORE_ERRORS:
        description: "编译一切，忽略错误。"
        default: false
        required: false
        type: boolean
      EXTRA_CONFIG:
        description: '额外配置选项，多个请用\n符号隔开。'
        required: false
        type: string
      FORCE_DELETE_PACKAGES:
        description: "强制删除已知有问题的插件，多个请用空格或者\n符号隔开。"
        required: false
        type: string
      SOURCE_OVERRIDE:
        description: "使用哪个源码库作为基础"
        type: string
        default: "VIKINGYFY/immortalwrt"
        required: false
      BRANCH_OVERRIDE:
        description: "使用哪个分支"
        type: string
        default: "main"
        required: false
      BUILD_NOWIFI:
        description: "是否编译NOWIFI版"
        default: false
        required: false
        type: boolean

#CI权限
permissions: write-all

#CI任务
jobs:
  config:
    name: ${{matrix.CONFIG}}
    strategy:
      fail-fast: false
      #max-parallel: 3
      matrix:
        CONFIG: ${{ fromJSON( (inputs.BUILD_NOWIFI == false || inputs.BUILD_NOWIFI == 'false') && '["IPQ60XX-WIFI-YES"]' || '["IPQ60XX-WIFI-YES", "IPQ60XX-WIFI-NO"]' ) }}
        SOURCE: ['${{inputs.SOURCE_OVERRIDE}}']
        BRANCH: ['${{inputs.BRANCH_OVERRIDE}}']

    #调用公用编译核心WRT-CORE.yml
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      #编译配置
      WRT_CONFIG: ${{matrix.CONFIG}}
      #默认主题
      WRT_THEME: argon
      #默认主机名
      WRT_NAME: OWRT
      #默认WIFI名称
      WRT_SSID: OWRT
      #默认WIFI密码
      WRT_WORD: 12345678
      #默认地址
      WRT_IP: 192.168.10.1
      #默认密码，仅作提示，修改无用
      WRT_PW: 无
      #源码链接
      WRT_REPO: https://github.com/${{matrix.SOURCE}}.git
      #源码分支
      WRT_BRANCH: ${{matrix.BRANCH}}
      #源码名称
      WRT_SOURCE: ${{matrix.SOURCE}}
      #插件调整
      WRT_PACKAGE: ${{inputs.PACKAGE}}
      #仅输出配置文件
      WRT_TEST: ${{inputs.TEST}}
      #编译一切，忽略错误
      WRT_IGNORE_ERRORS: ${{inputs.IGNORE_ERRORS}}
      #额外配置选项
      WRT_EXTRA_CONFIG: ${{inputs.EXTRA_CONFIG}}
      #强制删除已知有问题的插件
      WRT_FORCE_DELETE_PACKAGES: ${{inputs.FORCE_DELETE_PACKAGES}}
